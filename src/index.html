<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Pagina Estatica</title>
        <link rel="icon" type="image/x-icon" href="../img/gato.ico">
    </head>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 480px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        header{
            background-color: #2496ed;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
        }

        header h1{margin: 0; font-size: 2rem;}
        header p{margin: 8px 0 0; opacity: 0.9;}

        main{
            background: white;
            padding: 30px;
            margin-top: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2{
            color: #2496ed;
            border-bottom: 2px solid #2496ed;
            padding-bottom: 6px;
        }

        ul{line-height: 2;}

        .info-box{
            background-color: #e8f4fd;
            border-left: 4px solid #2496ed;
            padding: 12px 16px;
            margin: 20px 0;
            border-radius: 0 4px 4px 0;
        }

        footer{
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
    
    <body>
        <header>Bienvenidos a la Pagina</header>
        <main>
            
        </main>
    </body>
